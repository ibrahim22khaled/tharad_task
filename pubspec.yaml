name: tharad_task
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  get_it: ^9.2.1
  injectable: ^3.0.0
  dartz: ^0.10.1
  bloc: ^9.2.1
  
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  reactive_forms: ^18.2.2
  dio: ^5.9.2
  flutter_gen: ^5.14.1
  svg_flutter: ^0.0.1
  shared_preferences: ^2.5.5
  gap: ^3.0.1
  flutter_secure_storage: ^10.3.1
  flutter_screenutil: ^5.9.3
  image_picker: ^1.2.2
  dotted_border: ^3.1.0
  pinput: ^6.0.2
  skeletonizer: ^2.1.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_gen_runner: ^5.14.1
  build_runner: ^2.15.0
  injectable_generator: 3.0.2
  hive_ce_generator: ^1.8.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets\fonts\Tajawal-Bold.ttf
          weight: 700
        - asset: assets\fonts\Tajawal-Medium.ttf
          weight: 500
        - asset: assets\fonts\Tajawal-Regular.ttf
          weight: 400


flutter_gen:
  output: lib/gen/

